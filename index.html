<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">
 
      
<title>Sin TLS</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:white;
    font-family:Arial,sans-serif;
}



/* SPHERE */


#sphere{
    position:fixed;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    overflow:hidden;
}
 


.sphereItem{
    position:absolute;
    left:50%;
    transform:translate(-50%,-50%);
    white-space:nowrap;
    //font-weight:bold;
}


#openTime {
   
 position: fixed;
    bottom: 2px;
    right: 5px;
    font-size: 4px;
    color: #aaa;
    opacity: 0.7;

}

</style>
</head>

<body>


<div id="sphere"></div>
<div id="openTime"></div>

<script>

// ======================================
// DATA
// ======================================

const numbers = ["Le Paradis","L'Infini","L'Origine","La vie est belle","La vie est magnifique","Le monde est merveilleux","Tout va bien","La Gratitude","La Positivité","L'Abondance","La Jeunesse","La Beauté","Authentique","L'Éternité","La Fontaine De Jouvence","En pleine forme","La Vitalité","La Force","En Bonne Santé","L'Énergie Vitale Universelle","L'Amour Universel","La Paix","La Liberté","Le Bien-être","La Joie","L'Aisance","Le Confort","L'Agapè","Le Bonheur","Florès","Épanoui","L'Harmonie","Merci","Namasté"];





// ======================================
// COLORS
// ======================================

const colors = [

    "red",
    "orange",
    "yellow",
    "green",
    "blue",
    "indigo",
    "violet"
    
];

// ======================================
// SPHERE
// ======================================

const levelCount = 60;
const verticalSpread = 1.15;
let sphereItems = [];

let dataIndex = 0;

let phase = 0;

let lastMove = 0;

let colorIndex = 0;

// ======================================
// CREATE ITEM
// ======================================

function createTopItem(){

    sphereItems.unshift({

        value:
            String(
                numbers[dataIndex]
            ),

      
color:
    colors[colorIndex],


        level : 0

    });

    dataIndex =
        (dataIndex + 1)
        %
        numbers.length;

colorIndex =
    (colorIndex + 1)
    %
    colors.length;

}

// ======================================
// DRAW
// ======================================



function drawSphere(){

    const sphere =
        document.getElementById(
            "sphere"
        );

    sphere.innerHTML = "";

    const sphereHeight =
        sphere.clientHeight;

    sphereItems.forEach(item => {

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "sphereItem";

        div.innerText =
            item.value;

        div.style.color =
            item.color;

      
const lineHeight = 28;

const y =
     -10 +
 item.level * lineHeight;


        div.style.top =
            y + "px";

        div.style.left =
            "50%";

        div.style.transform =
            "translate(-50%,-50%)";

        const length =
            String(
                item.value
            ).length;

        const fontSize =
            Math.max(
              
           

  10,
        30 - length * 0.5


            );

        div.style.fontSize =
            fontSize + "px";

        sphere.appendChild(div);

    });
}



// ======================================
// MOVEMENT
// ======================================


function moveForward(step){

    sphereItems.forEach(item=>{
        item.level += step;
    });

    sphereItems =
        sphereItems.filter(
            item => item.level < levelCount
        );

    if(
        sphereItems.length === 0 ||
        sphereItems[0].level >= 1
    ){
        createTopItem();
    }
}


function moveBackward(step){

    sphereItems.forEach(item=>{
        item.level -= step;
    });

    sphereItems =
        sphereItems.filter(
            item => item.level >= 0
        );

    if(
        sphereItems.length === 0 ||
        sphereItems[sphereItems.length-1].level <= levelCount-2
    ){

      
colorIndex =
    (
        colorIndex - 1 +
        colors.length
    )
    %
    colors.length;


dataIndex =
    (
        dataIndex - 1 +
        numbers.length
    )
    %
    numbers.length;

        sphereItems.push({

            value:
                String(
                    numbers[dataIndex]
                ),

           
color:
    colors[colorIndex],


            level:
                levelCount - 1

        });
    }
}

// ======================================
// SINUSOID
// ======================================

function loop(timestamp){

    const cycleDuration = 124.121212121;

    phase +=
        (1.939393939*Math.PI)
        /
        (cycleDuration * 60);

    const wave =
        Math.sin(
            phase
        );

    const direction =
        wave >= 0
        ? 1
        : -1;

    const speed =
        Math.abs(
            wave
        );

    

    
        



const minInterval = 60.60606060;
const maxInterval = 1939.393939;


const equivalentInterval =
    maxInterval -
    speed *
    (
        maxInterval -
        minInterval
    );

const step =
    30 / equivalentInterval;


if(direction > 0){
    moveForward(step);
}
else{
    moveBackward(step);
}

drawSphere();

requestAnimationFrame(
    loop
);
}

// ======================================
// FULLSCREEN
// ======================================

function enterFullscreen(){

    if(
      !document.fullscreenElement
    ){

        document
        .documentElement
        .requestFullscreen()
        .catch(()=>{});
    }
}

document.addEventListener(
    "click",
    enterFullscreen,
    {once:true}
);

document.addEventListener(
    "touchstart",
    enterFullscreen,
    {once:true}
);

// ======================================
// START
// ======================================

window.addEventListener(
    "load",
    ()=>{
keepScreenAwake();
      



createTopItem();
drawSphere();
const openedAt = new Date();
    document.getElementById("openTime").textContent =
        openedAt.toLocaleString();
        requestAnimationFrame(
            loop
        );
    }
);
      
let wakeLock = null;

async function keepScreenAwake() {
    try {
        wakeLock = await navigator.wakeLock.request("screen");

        wakeLock.addEventListener("release", () => {
            console.log("Wake Lock released");
        });

        console.log("Screen Wake Lock active");

    } catch (err) {
        console.log("Wake Lock error:", err);
    }
}

document.addEventListener("visibilitychange", async () => {

    if (
        wakeLock !== null &&
        document.visibilityState === "visible"
    ) {
        await keepScreenAwake();
    }

});

</script>

</body>
</html>
