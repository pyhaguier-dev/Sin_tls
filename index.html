function moveForward(step){

    sphereItems.forEach(item=>{
        item.level += step;
    });

    sphereItems =
        sphereItems.filter(

        );

        sphereItems.length === 0 ||

// ======================================

// ======================================

function loop(timestamp){

    const cycleDuration = 124.121212121;

    phase +=
        (1.939393939*Math.PI)
        /
        (cycleDuration * 60);

    const wave =
        Math.sin(
            phase
        );

    const direction =
        wave >= 0
        ? 1
        : -1;

    const speed =
        Math.abs(
            wave
        );

    

    
        



const minInterval = 30.30303030;
//const maxInterval = 969.69696969;
const maxInterval = 1939.393939;
const equivalentInterval =
    maxInterval -
    speed *
    (
        maxInterval -
        minInterval
    );

const step =
    30 / equivalentInterval;


if(direction > 0){
    moveForward(step);
}
else{
    moveBackward(step);
}

requestAnimationFrame(
    loop
);
}
